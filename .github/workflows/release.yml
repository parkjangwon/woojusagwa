name: Release Build

on:
  push:
    tags:
      - 'dev-*'
      - 'v*'

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Build with Gradle
        run: |
          cd android
          # gradlew가 없을 경우를 대비해 gradle 직접 설치 또는 wrapper 생성 시도
          gradle assembleRelease

      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: woojusagwa-android-apk
          path: android/app/build/outputs/apk/release/*.apk

  build-macos:
    name: Build macOS (Apple Silicon)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      
      - name: Archive macOS Source
        run: |
          cd macos
          # 현재는 소스 파일만 있으므로 Zip으로 압축하여 전달 (추후 xcodebuild 연동)
          zip -r Woojusagwa-macOS-Source.zip .

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: woojusagwa-macos-zip
          path: macos/Woojusagwa-macOS-Source.zip

  create-release:
    name: Create GitHub Release
    needs: [build-android, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            *.apk
            *.zip
          draft: false
          prerelease: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
