name: Release Build

on:
  push:
    tags:
      - 'dev-*'
      - 'v*'

permissions:
  contents: write

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Prepare Android signing
        env:
          ANDROID_SIGNING_KEYSTORE_HEX: ${{ secrets.ANDROID_SIGNING_KEYSTORE_HEX }}
          ANDROID_SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_SIGNING_STORE_PASSWORD }}
          ANDROID_SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_SIGNING_KEY_ALIAS }}
          ANDROID_SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_SIGNING_KEY_PASSWORD }}
        run: |
          test -n "$ANDROID_SIGNING_KEYSTORE_HEX"
          test -n "$ANDROID_SIGNING_STORE_PASSWORD"
          test -n "$ANDROID_SIGNING_KEY_ALIAS"
          test -n "$ANDROID_SIGNING_KEY_PASSWORD"
          python3 - <<'PY'
          import os
          from pathlib import Path

          output = Path(os.environ["RUNNER_TEMP"]) / "woojusagwa-release.jks"
          output.write_bytes(bytes.fromhex(os.environ["ANDROID_SIGNING_KEYSTORE_HEX"]))
          PY

      - name: Test and Build Android
        env:
          ANDROID_SIGNING_STORE_FILE: ${{ runner.temp }}/woojusagwa-release.jks
          ANDROID_SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_SIGNING_STORE_PASSWORD }}
          ANDROID_SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_SIGNING_KEY_ALIAS }}
          ANDROID_SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_SIGNING_KEY_PASSWORD }}
        run: |
          cd android
          chmod +x gradlew
          ./gradlew --no-daemon testDebugUnitTest assembleRelease

      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: woojusagwa-android-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk

  build-macos:
    name: Build macOS (Apple Silicon)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      
      - name: Test macOS Core
        run: |
          cd macos/WoojusagwaCore
          swift test

      - name: Build macOS App
        run: |
          cd macos
          # Create build directory
          mkdir -p build
          rm -rf build/dmg
          
          # Build the app using xcodebuild (Apple Silicon target)
          # Note: Adjust scheme name if necessary (default is project folder name)
          xcodebuild -project Woojusagwa/Woojusagwa.xcodeproj \
                     -scheme Woojusagwa \
                     -configuration Release \
                     -derivedDataPath build \
                     -destination 'platform=macOS,arch=arm64' \
                     CODE_SIGNING_ALLOWED=NO

          mkdir -p build/dmg
          cp -R build/Build/Products/Release/Woojusagwa.app build/dmg/우주사과.app

          # Ad-hoc sign the final renamed bundle so macOS sees a stable app identity
          # while users still install "우주사과.app" from the DMG.
          codesign --force --deep --sign - build/dmg/우주사과.app
          codesign --verify --deep --strict build/dmg/우주사과.app

          ln -s /Applications build/dmg/Applications

          # Package into DMG
          hdiutil create -volname "woojusagwa" -srcfolder build/dmg -ov -format UDZO woojusagwa-macos-arm64.dmg

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: woojusagwa-macos-dmg
          path: macos/woojusagwa-macos-arm64.dmg

  create-release:
    name: Create GitHub Release
    needs: [build-android, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            *.apk
            *.dmg
          draft: false
          prerelease: ${{ startsWith(github.ref_name, 'dev-') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
