name: Release Build

on:
  push:
    tags:
      - 'dev-*'
      - 'v*'

permissions:
  contents: write

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Generate Gradle Wrapper JAR
        run: |
          cd android
          # 만약 jar가 없으면 gradle wrapper를 강제 실행하여 생성 시도
          # ubuntu runner에는 gradle이 기본 설치되어 있음
          gradle wrapper --gradle-version 8.2

      - name: Build with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: woojusagwa-android-apk
          path: android/app/build/outputs/apk/debug/*.apk

  build-macos:
    name: Build macOS (Apple Silicon)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      
      - name: Build macOS App
        run: |
          cd macos
          # Create build directory
          mkdir -p build
          
          # Build the app using xcodebuild (Apple Silicon target)
          # Note: Adjust scheme name if necessary (default is project folder name)
          xcodebuild -project Woojusagwa/Woojusagwa.xcodeproj \
                     -scheme Woojusagwa \
                     -configuration Release \
                     -derivedDataPath build \
                     -destination 'platform=macOS,arch=arm64' \
                     CODE_SIGNING_ALLOWED=NO
          
          # Find and move the app
          find build -name "*.app" -exec mv {} . \;
          
          # Package into DMG
          hdiutil create -volname "woojusagwa" -srcfolder Woojusagwa.app -ov -format UDZO woojusagwa-macos-arm64.dmg

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: woojusagwa-macos-dmg
          path: macos/woojusagwa-macos-arm64.dmg

  create-release:
    name: Create GitHub Release
    needs: [build-android, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            *.apk
            *.dmg
          draft: false
          prerelease: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
